<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReleaseFlow Pro</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800;14..32,900&display=swap');

/* ╔═══════════════════════════════════════╗
   ║  DESIGN TOKENS                        ║
   ╚═══════════════════════════════════════╝ */
:root {
  /* Canvas — warm paper */
  --canvas:      #fdfcf8;
  --bg:          #fdfcf8;
  --surface:     #ffffff;
  --surface-2:   #f7f6f1;
  --surface-3:   #efede5;

  /* Brand — Indigo */
  --primary:       #5c6ac4;
  --primary-d:     #3f51b5;
  --primary-light: #eef0fb;
  --primary-rgb:   92, 106, 196;

  /* Text */
  --text-main:  #18181b;
  --text-muted: #52525b;
  --text-dim:   #a1a1aa;

  /* Borders — warm, airy */
  --border:   #e4e2d8;
  --border-2: #cbc8bc;

  /* Semantic */
  --clr-done:    #16a34a;
  --clr-done-bg: #f0fdf4;
  --clr-done-bd: #bbf7d0;
  --clr-block:   #dc2626;
  --clr-block-bg:#fef2f2;
  --clr-block-bd:#fecaca;
  --clr-blue:    #2563eb;

  /* Also expose as --green/--red for legacy JS inline refs */
  --green: #16a34a;
  --red:   #dc2626;

  /* Geometry */
  --radius:    10px;
  --radius-sm:  7px;
  --radius-xs:  4px;

  /* Shadows — very light, paper-like */
  --shadow-0: none;
  --shadow-1: 0 1px 2px rgba(10,8,0,.04), 0 2px 8px rgba(10,8,0,.03);
  --shadow-2: 0 2px 8px rgba(10,8,0,.06), 0 6px 20px rgba(10,8,0,.05);
  --shadow-3: 0 8px 24px rgba(10,8,0,.09), 0 20px 48px rgba(10,8,0,.07);
}

[data-theme="dark"] {
  --canvas:      #141210;
  --bg:          #141210;
  --surface:     #1c1a17;
  --surface-2:   #232018;
  --surface-3:   #2c2820;

  --primary:       #7986cb;
  --primary-d:     #5c6bc0;
  --primary-light: #1e2040;
  --primary-rgb:   121, 134, 203;

  --text-main:  #ede8df;
  --text-muted: #857e72;
  --text-dim:   #4a4540;

  --border:   #2a2620;
  --border-2: #3a3530;

  --clr-done-bg: #052e16;
  --clr-done-bd: #14532d;
  --clr-block-bg:#450a0a;
  --clr-block-bd:#7f1d1d;

  --shadow-1: 0 1px 2px rgba(0,0,0,.5),  0 2px 6px rgba(0,0,0,.4);
  --shadow-2: 0 2px 6px rgba(0,0,0,.55), 0 8px 24px rgba(0,0,0,.45);
  --shadow-3: 0 8px 24px rgba(0,0,0,.65), 0 24px 56px rgba(0,0,0,.5);
}

/* ╔═══════════════════════════════════════╗
   ║  RESET                                ║
   ╚═══════════════════════════════════════╝ */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0; padding: 0; border: none;
  outline: none !important;
}
html { font-size: 14px; }
body {
  font-family: 'Inter', system-ui, -apple-system, sans-serif;
  font-feature-settings: 'cv11', 'ss01';
  font-optical-sizing: auto;
  background: var(--canvas);
  color: var(--text-main);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  min-height: 100vh;
  transition: background .25s, color .25s;
}

/* ╔═══════════════════════════════════════╗
   ║  NAVIGATION                           ║
   ╚═══════════════════════════════════════╝ */
nav {
  position: sticky; top: 0; z-index: 500;
  height: 52px;
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  align-items: center;
  padding: 0 2rem;
  background: rgba(253,252,248,.92);
  backdrop-filter: saturate(160%) blur(20px);
  -webkit-backdrop-filter: saturate(160%) blur(20px);
  border-bottom: 1px solid var(--border) !important;
  box-shadow: none;
}
[data-theme="dark"] nav {
  background: rgba(20,18,16,.94);
}

/* Logo (left cell) */
.nav-logo {
  display: flex; align-items: center; gap: 9px;
}
.logo-tile {
  width: 30px; height: 30px; border-radius: 9px; flex-shrink: 0;
  background: linear-gradient(145deg, var(--primary) 0%, var(--primary-d) 100%);
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 12px;
  box-shadow: 0 2px 8px rgba(var(--primary-rgb), .38),
              inset 0 1px 0 rgba(255,255,255,.2);
}
.logo-label {
  font-size: 13px; font-weight: 700; letter-spacing: -.3px;
  color: var(--text-main);
}
.logo-label em { font-style: normal; color: var(--primary); }

/* Month picker (center cell) */
.nav-month { position: relative; display: flex; justify-content: center; }

.month-toggle {
  display: inline-flex; align-items: center; gap: 8px;
  height: 34px; padding: 0 14px;
  background: var(--surface);
  border: 1px solid var(--border) !important;
  border-radius: 20px;
  font-family: 'Inter', sans-serif;
  font-size: 13px; font-weight: 600;
  color: var(--text-main);
  cursor: pointer;
  transition: background .12s, box-shadow .12s;
  white-space: nowrap;
}
.month-toggle:hover {
  background: var(--surface-2);
  box-shadow: var(--shadow-1);
}
.month-toggle .pip {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--primary); flex-shrink: 0;
}
.month-toggle .caret {
  font-size: 8px; color: var(--text-dim);
  transition: transform .2s;
}
.month-toggle.open .caret { transform: rotate(180deg); }

/* Month dropdown */
#mDrop {
  display: none;
  position: absolute; top: calc(100% + 6px);
  left: 50%; transform: translateX(-50%);
  width: 220px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow-3);
  overflow: hidden; z-index: 600;
  animation: pop-in .14s cubic-bezier(.16,1,.3,1);
}
#mList { max-height: 288px; overflow-y: auto; padding: 5px; }
.mdrop-footer { padding: 6px; border-top: 1px solid var(--border); }

/* Right actions (right cell, right-justified) */
.nav-actions {
  display: flex; align-items: center; gap: 5px;
  justify-content: flex-end;
}
#saveStatus {
  display: none; align-items: center;
  height: 28px; padding: 0 10px;
  border-radius: 20px; border: 1px solid var(--border) !important;
  background: var(--surface-2);
  font-size: 11px; font-weight: 500; color: var(--text-dim);
}
.nav-sep { width: 1px; height: 20px; background: var(--border); margin: 0 3px; flex-shrink: 0; }

/* ─ action button ─ */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 5px;
  height: 32px; padding: 0 11px;
  border-radius: var(--radius-sm);
  background: var(--surface);
  border: 1px solid var(--border) !important;
  font-family: 'Inter', sans-serif;
  font-size: 12px; font-weight: 500;
  color: var(--text-muted);
  cursor: pointer; white-space: nowrap;
  transition: background .12s, color .12s, box-shadow .12s;
}
.btn i { font-size: 11px; }
.btn:hover { background: var(--surface-2); color: var(--text-main); }
.btn--icon { padding: 0; width: 32px; }
.btn--primary {
  background: var(--primary); color: #fff;
  border-color: transparent !important; font-weight: 600;
  box-shadow: 0 1px 3px rgba(var(--primary-rgb),.35),
              0 3px 10px rgba(var(--primary-rgb),.2);
}
.btn--primary:hover {
  background: var(--primary-d); color: #fff;
  box-shadow: 0 2px 6px rgba(var(--primary-rgb),.45),
              0 6px 18px rgba(var(--primary-rgb),.25);
}

/* ╔═══════════════════════════════════════╗
   ║  PAGE HEADER                          ║
   ╚═══════════════════════════════════════╝ */
.page-header {
  max-width: 660px; margin: 2.75rem auto 0; padding: 0 2rem;
  border-bottom: 1px solid var(--border);
  padding-bottom: 1.5rem;
}
.page-header h2 {
  font-size: 1.9rem; font-weight: 800; letter-spacing: -.7px; line-height: 1;
  color: var(--text-main);
}
.page-header p {
  display: inline-block; margin-top: 8px;
  font-size: 13px; font-weight: 400; color: var(--text-dim);
  border-bottom: 1.5px dashed transparent;
  cursor: text; min-width: 36px; padding-bottom: 1px;
  transition: border-color .15s, color .15s;
}
.page-header p:focus { border-color: var(--primary); color: var(--text-muted); }

/* ╔═══════════════════════════════════════╗
   ║  TIMELINE                             ║
   ╚═══════════════════════════════════════╝ */
.main-wrap {
  max-width: 660px;
  margin: 2rem auto;
  padding: 0 2rem 8rem;
}

.stage-row {
  display: grid;
  grid-template-columns: 60px 20px 1fr;
  gap: 0 14px;
  margin-bottom: 2.25rem;
  position: relative;
  align-items: start;
}

/* Connector line — color driven by --st-color set per stage-row in JS */
.v-line {
  position: absolute;
  left: 84px;   /* 60 + 14 + 10 (half of 20px dot col) */
  top: 36px; bottom: -36px;
  width: 2px; border-radius: 2px; z-index: 0;
  background: linear-gradient(to bottom, var(--st-color, var(--border)) 40%, transparent);
}
.stage-row:last-child > .v-line { display: none; }

/* Side label — mirrors card title, read-only */
.side-label {
  text-align: right;
  padding-top: 15px;
  font-size: 9.5px; font-weight: 600; letter-spacing: .4px;
  text-transform: uppercase; color: var(--text-dim); line-height: 1.4;
  overflow: hidden; text-overflow: ellipsis;
}
.side-label:empty::before { content: '—'; color: var(--border); }

/* Timeline dot — color driven by --st-color */
.dot-wrap { display: flex; justify-content: center; padding-top: 14px; z-index: 2; }
.dot {
  width: 12px; height: 12px; border-radius: 50%;
  background: var(--st-color, var(--surface));
  border: 1.5px solid var(--st-color, var(--border-2)) !important;
  box-shadow: 0 0 0 4px var(--canvas);
  transition: all .22s cubic-bezier(.34,1.56,.64,1);
}

/* ╔═══════════════════════════════════════╗
   ║  CARD                                 ║
   ╚═══════════════════════════════════════╝ */
.card {
  position: relative;
  background: var(--surface);
  border: 1px solid var(--border) !important;
  border-left-width: 3px !important;   /* accent stripe */
  border-radius: var(--radius);
  box-shadow: none;
  overflow: visible;
  transition: box-shadow .18s, border-left-color .2s;
}
.card:hover { box-shadow: var(--shadow-1); }

/* Status accent: left border color driven by --st-color */
.stage-row .card { border-left-color: var(--st-color, var(--border-2)) !important; }

/* Ghost delete */
.ghost-del {
  position: absolute; top: 10px; right: 10px; z-index: 10;
  width: 26px; height: 26px; border-radius: 7px;
  background: transparent; color: transparent;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; cursor: pointer;
  transition: background .15s, color .15s, transform .15s;
}
.card:hover .ghost-del { color: var(--text-dim); background: var(--surface-2); }
.ghost-del:hover { background: var(--clr-block-bg) !important; color: var(--clr-block) !important; }

/* Delete confirmation bar */
.del-confirm-bar {
  position: absolute; bottom: 0; left: 0; right: 0; z-index: 20;
  display: flex; align-items: center; justify-content: space-between;
  padding: 9px 14px;
  background: var(--clr-block-bg);
  border-top: 1px solid var(--clr-block-bd);
  border-radius: 0 0 var(--radius) var(--radius);
  font-size: 12px; font-weight: 600; color: var(--clr-block);
  animation: fadeSlideUp .15s ease;
}
@keyframes fadeSlideUp {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}
.del-confirm-btn {
  font-family: inherit; font-size: 11px; font-weight: 600;
  padding: 4px 12px; border-radius: 6px; cursor: pointer; border: none !important;
}
.del-confirm-cancel { background: var(--surface-2); color: var(--text-dim); }
.del-confirm-cancel:hover { background: var(--border); }
.del-confirm-ok { background: var(--clr-block); color: #fff; }
.del-confirm-ok:hover { opacity: .85; }

/* Long-press delete mode */
.card.lp-del .ghost-del {
  color: var(--clr-block) !important;
  background: var(--clr-block-bg) !important;
  transform: scale(1.15);
}
.card.lp-del {
  box-shadow: 0 0 0 2px var(--clr-block-bd) !important;
}

/* ── Card Top ── */
.card-top {
  padding: 16px 46px 13px 18px;
  display: flex; align-items: flex-start;
  justify-content: space-between; gap: 10px;
}
.card-title {
  display: block; background: transparent;
  font-size: 14.5px; font-weight: 700; letter-spacing: -.3px;
  color: var(--text-main); line-height: 1.35;
}
.card-subtitle {
  display: block; background: transparent;
  font-size: 10px; font-weight: 500; letter-spacing: .4px;
  text-transform: uppercase; color: var(--text-dim);
  margin-top: 3px; min-width: 24px;
}

/* Status badge */
.spill {
  flex-shrink: 0; display: inline-flex; align-items: center;
  height: 24px; padding: 0 9px; border-radius: 20px;
  font-family: 'Inter', sans-serif;
  font-size: 11px; font-weight: 600;
  border: 1px solid transparent;
  cursor: pointer; white-space: nowrap;
  transition: opacity .12s;
  user-select: none;
}
.spill:hover { opacity: .78; }
.sp-Completed { background: var(--clr-done-bg);  color: var(--clr-done);  border-color: var(--clr-done-bd)  !important; }
.sp-Blocked   { background: var(--clr-block-bg); color: var(--clr-block); border-color: var(--clr-block-bd) !important; }
.sp-Pending   { background: var(--surface-2); color: var(--text-dim); border-color: var(--border) !important; }

/* QA inline button */
.qa-btn {
  display: inline-flex; align-items: center; gap: 5px;
  height: 24px; padding: 0 9px; border-radius: 6px;
  background: var(--surface-2); color: var(--text-muted);
  border: 1px solid var(--border) !important;
  font-family: 'Inter', sans-serif;
  font-size: 11px; font-weight: 500;
  cursor: pointer; white-space: nowrap;
  transition: background .12s, color .12s;
}
.qa-btn i { font-size: 10px; color: var(--clr-done); }
.qa-btn:hover { background: var(--surface-3); color: var(--text-main); }

/* ── Tags ── */
.tag-row {
  position: relative;               /* anchor for the floating popup */
  display: flex; flex-wrap: wrap; align-items: center;
  gap: 5px;
  padding: 8px 14px 10px 18px;
  min-height: 40px;
  border-top: 1px solid var(--border);
  margin-left: 3px;                 /* inset so separator doesn't touch the accent stripe */
}

.tag-pill {
  display: inline-flex; align-items: center;
  height: 22px; padding: 0 10px; border-radius: 20px;
  font-size: 10px; font-weight: 700; letter-spacing: .4px;
  text-transform: uppercase;
  background: var(--primary-light); color: var(--primary);
  border: 1px solid rgba(var(--primary-rgb),.2) !important;
  cursor: pointer;
  transition: background .12s, color .12s, box-shadow .12s;
  user-select: none;
}
.tag-pill:hover {
  background: var(--primary); color: #fff;
  box-shadow: 0 2px 8px rgba(var(--primary-rgb),.28);
}

/* Popup floats below the tag row — doesn't push any pills */
.tag-popup {
  position: absolute;
  left: 18px;
  top: calc(100% - 2px);
  z-index: 50;
  display: inline-flex; align-items: center; gap: 8px;
  height: 30px; padding: 0 8px 0 12px;
  background: var(--surface);
  border: 1px solid var(--primary) !important;
  border-radius: 10px;
  font-size: 11.5px; font-weight: 500;
  color: var(--text-main);
  white-space: nowrap;
  box-shadow: 0 4px 16px rgba(var(--primary-rgb),.18),
              0 1px 4px rgba(var(--primary-rgb),.12);
  animation: slide-up .14s cubic-bezier(.16,1,.3,1);
}
.tag-popup strong { color: var(--primary); font-weight: 700; margin-right: 2px; }

.tag-popup-close {
  width: 18px; height: 18px; border-radius: 6px; flex-shrink: 0;
  background: var(--surface-2); color: var(--text-dim);
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; cursor: pointer;
  transition: background .12s, color .12s;
}
.tag-popup-close:hover { background: var(--clr-block); color: #fff; }

.tag-btn {
  display: inline-flex; align-items: center; gap: 4px;
  height: 22px; padding: 0 9px; border-radius: 20px;
  border: 1.5px dashed var(--border-2) !important;
  background: transparent; color: var(--text-dim);
  font-family: 'Inter', sans-serif; font-size: 10px; font-weight: 600;
  cursor: pointer; transition: border-color .12s, color .12s;
}
.tag-btn:hover { border-color: var(--primary) !important; color: var(--primary); }

/* Tag color swatches */
.tc-row { display: flex; gap: 6px; flex-wrap: wrap; padding: 6px 0 2px; }
.tc {
  width: 22px; height: 22px; border-radius: 50%; cursor: pointer; flex-shrink: 0;
  border: 2px solid transparent !important;
  transition: transform .12s, border-color .12s;
}
.tc:hover { transform: scale(1.18); }
.tc.sel { border-color: var(--text-main) !important; transform: scale(1.18); }

/* Status picker dropdown */
.sp-custom { background: var(--surface-3); color: var(--text-muted); border-color: var(--border-2) !important; }
.status-picker {
  position: absolute;
  top: calc(100% + 5px);
  right: 0;
  z-index: 200;
  background: var(--surface);
  border: 1px solid var(--border) !important;
  border-radius: var(--radius-sm);
  box-shadow: var(--shadow-3);
  min-width: 138px;
  max-height: 260px;
  overflow-y: auto;
  animation: slide-up .12s cubic-bezier(.16,1,.3,1);
}
.sp-item {
  padding: 7px 13px;
  font-size: 12px; font-weight: 500; color: var(--text-main);
  cursor: pointer; transition: background .1s;
  white-space: nowrap;
}
.sp-item:hover { background: var(--surface-2); }
.sp-item.sp-active { font-weight: 700; color: var(--primary); background: var(--primary-light); }

/* ── Specs band — vertical list ── */
.specs-band {
  display: flex; flex-direction: column; gap: 1px;
  margin: 2px 14px 10px 18px;
}

.spec-item {
  position: relative;
  display: flex; align-items: center;
  padding: 1px 20px 1px 0;
  font-size: 12px; line-height: 1.75;
}

.spec-key {
  font-weight: 600; color: var(--text-muted);
  white-space: nowrap;
}
.spec-key::after { content: ''; margin-right: 4px; }

.spec-val {
  font-weight: 700; color: var(--text-main);
  white-space: nowrap;
}

/* ── Card Footer ── */
.card-footer {
  display: flex; flex-wrap: wrap; align-items: center;
  gap: 6px; padding: 11px 16px 14px 18px;
}

.logs-btn {
  display: inline-flex; align-items: center; gap: 6px;
  height: 30px; padding: 0 13px; border-radius: 7px;
  background: var(--primary); color: #fff;
  font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 600;
  cursor: pointer;
  box-shadow: 0 1px 3px rgba(var(--primary-rgb),.32),
              0 3px 10px rgba(var(--primary-rgb),.18);
  transition: background .12s, box-shadow .12s, transform .12s;
}
.logs-btn:hover {
  background: var(--primary-d);
  box-shadow: 0 2px 6px rgba(var(--primary-rgb),.42),
              0 6px 18px rgba(var(--primary-rgb),.24);
  transform: translateY(-1px);
}
.logs-btn i { font-size: 11px; }

/* ╔═══════════════════════════════════════╗
   ║  EXPAND PANELS (QA / Logs)            ║
   ╚═══════════════════════════════════════╝ */
.expand-panel {
  margin: 0 10px 10px;
  border: 1px solid var(--border) !important;
  border-radius: var(--radius-sm);
  overflow: visible;
  background: var(--surface);
}

.expand-panel-hdr {
  display: flex; align-items: center; justify-content: space-between;
  padding: 9px 13px;
  background: var(--surface-2);
  border-bottom: 1px solid var(--border) !important;
  font-size: 10px; font-weight: 700;
  letter-spacing: .55px; text-transform: uppercase; color: var(--text-dim);
}
/* Count pill inside panel header */
.expand-panel-hdr span:last-child {
  font-size: 10px; font-weight: 600; color: var(--text-muted);
  background: var(--surface-3); padding: 1px 8px; border-radius: 10px;
  letter-spacing: 0; text-transform: none;
}

/* QA rows */
.qa-row {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 13px;
  border-bottom: 1px solid var(--border) !important;
  background: var(--surface);
}
.qa-row:last-child { border-bottom: none !important; }
.qa-name {
  font-size: 12.5px; font-weight: 600;
  color: var(--text-main); background: transparent;
  line-height: 1.3;
}
.qa-badge {
  display: inline-flex; align-items: center;
  height: 21px; padding: 0 8px; border-radius: 20px;
  font-family: 'Inter', sans-serif;
  font-size: 10.5px; font-weight: 700;
  cursor: pointer; white-space: nowrap;
  border: 1px solid transparent;
  transition: opacity .1s; user-select: none;
}
.qa-badge:hover { opacity: .75; }
.qa-Pending  { background: var(--surface-2);      color: var(--text-dim);  border-color: var(--border)     !important; }
.qa-Passed   { background: var(--clr-done-bg);    color: var(--clr-done);  border-color: var(--clr-done-bd) !important; }
.qa-Approved { background: #eff6ff; color: var(--clr-blue); border-color: #bfdbfe !important; }
.qa-Failed   { background: var(--clr-block-bg);   color: var(--clr-block); border-color: var(--clr-block-bd) !important; }

/* Data rows (used in blocked reasons) */
.data-row {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 13px;
  border-bottom: 1px solid var(--border) !important;
  font-size: 12.5px; background: var(--surface);
}
.data-row:last-child { border: none !important; }

/* Log category */
.log-cat {
  background: var(--surface);
  border-bottom: 1px solid var(--border) !important;
}
.log-cat:last-child { border-bottom: none !important; }

.log-hdr {
  display: flex; justify-content: space-between; align-items: center;
  padding: 9px 13px; cursor: pointer;
  font-size: 12.5px; font-weight: 600; color: var(--text-muted);
  transition: background .1s;
}
.log-hdr:hover { background: var(--surface-2); }

.log-item {
  display: flex; gap: 8px; align-items: flex-start;
  padding: 7px 13px; font-size: 12px;
  border-top: 1px solid var(--border) !important;
  background: var(--surface);
}

/* ── Section heads ── */
.s-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.s-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--text-dim); }
.s-count { font-size: 10px; font-weight: 700; color: var(--text-muted); background: var(--border); padding: 1px 6px; border-radius: 4px; }

/* ╔═══════════════════════════════════════╗
   ║  MODALS                               ║
   ╚═══════════════════════════════════════╝ */
.modal-backdrop {
  display: none; position: fixed; inset: 0; z-index: 1000;
  background: rgba(9,10,18,.55);
  backdrop-filter: blur(12px) saturate(150%);
  -webkit-backdrop-filter: blur(12px) saturate(150%);
  align-items: center; justify-content: center;
}
.modal-card {
  width: 320px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 22px;
  box-shadow: var(--shadow-3);
  animation: modal-in .18s cubic-bezier(.16,1,.3,1);
}
.modal-hd {
  display: flex; align-items: center; gap: 10px; margin-bottom: 18px;
}
.modal-hd-icon {
  width: 32px; height: 32px; border-radius: 9px; flex-shrink: 0;
  background: var(--primary-light); color: var(--primary);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px;
}
.modal-hd h4 {
  font-size: 14px; font-weight: 700; letter-spacing: -.2px;
  color: var(--text-main);
}
.modal-input {
  display: block; width: 100%;
  height: 38px; padding: 0 12px; margin-bottom: 8px;
  background: var(--surface-2);
  border: 1.5px solid var(--border) !important;
  border-radius: var(--radius-sm);
  font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 400;
  color: var(--text-main);
  transition: border-color .15s, background .15s;
}
.modal-input::placeholder { color: var(--text-dim); }
.modal-input:focus { border-color: var(--primary) !important; background: var(--surface); }
.modal-input:last-of-type { margin-bottom: 14px; }
.modal-save {
  display: flex; align-items: center; justify-content: center;
  width: 100%; height: 38px; border-radius: var(--radius-sm);
  background: var(--primary); color: #fff;
  font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600;
  cursor: pointer;
  box-shadow: 0 2px 8px rgba(var(--primary-rgb),.32),
              0 4px 18px rgba(var(--primary-rgb),.18);
  transition: background .12s, box-shadow .12s, transform .12s;
}
.modal-save:hover {
  background: var(--primary-d);
  box-shadow: 0 4px 12px rgba(var(--primary-rgb),.42),
              0 8px 28px rgba(var(--primary-rgb),.24);
  transform: translateY(-1px);
}

/* ╔═══════════════════════════════════════╗
   ║  ANIMATIONS                           ║
   ╚═══════════════════════════════════════╝ */
@keyframes pop-in {
  from { opacity: 0; transform: translateX(-50%) scale(.96) translateY(-4px); }
  to   { opacity: 1; transform: translateX(-50%) scale(1)   translateY(0);    }
}
@keyframes slide-up {
  from { opacity: 0; transform: translateY(-4px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes modal-in {
  from { opacity: 0; transform: scale(.95) translateY(12px); }
  to   { opacity: 1; transform: scale(1)   translateY(0);    }
}

/* ── Scrollbar (Webkit) ── */
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }
</style>
</head>
<body>

<!-- ░░ NAV ░░ -->
<nav>

  <!-- Left: Logo -->
  <div class="nav-logo">
    <div class="logo-tile"><i class="fas fa-layer-group"></i></div>
    <span class="logo-label">Release<em>Flow</em> Pro</span>
  </div>

  <!-- Center: Month picker -->
  <div class="nav-month">
    <button class="month-toggle" id="monthToggleBtn"
      onclick="
        const d = document.getElementById('mDrop');
        const btn = document.getElementById('monthToggleBtn');
        const open = d.style.display === 'block';
        d.style.display = open ? 'none' : 'block';
        btn.classList.toggle('open', !open);
      ">
      <span class="pip"></span>
      <span id="mActive">March 2026</span>
      <i class="fas fa-chevron-down caret"></i>
    </button>

    <div id="mDrop">
      <div id="mList"></div>
      <div class="mdrop-footer">
        <button class="btn btn--primary" style="width:100%;justify-content:center"
          onclick="openMdl('monthModal')">
          <i class="fas fa-plus"></i> New Month
        </button>
      </div>
    </div>
  </div>

  <!-- Right: Actions -->
  <div class="nav-actions">
    <span id="saveStatus"></span>
    <button class="btn" onclick="importJSON()" title="Import JSON">
      <i class="fas fa-folder-open"></i> Import
    </button>
    <button class="btn" onclick="exportJSON()" title="Export JSON" style="color:var(--primary)">
      <i class="fas fa-download"></i> Export
    </button>
    <button class="btn" onclick="generateViewer()" title="Generate viewer" style="color:var(--clr-done)">
      <i class="fas fa-file-export"></i> Generate
    </button>
    <div class="nav-sep"></div>
    <button class="btn btn--icon" onclick="toggleTheme()" title="Toggle theme">
      <i class="fas fa-moon"></i>
    </button>
    <button class="btn btn--primary" onclick="addStage()">
      <i class="fas fa-plus"></i> New Stage
    </button>
  </div>

  <input type="file" id="jsonFileInput" accept=".json" style="display:none"
    onchange="loadJSONFile(this)">
</nav>

<!-- ░░ PAGE HEADER ░░ -->
<div class="page-header">
  <h2 id="headerMonth">March 2026</h2>
  <p id="headerSub"
     contenteditable="true"
     onblur="saveSubHeading(this.innerText); this.style.borderColor='transparent'"
     onfocus="this.style.borderColor='var(--primary)'"
     title="Click to edit sub-heading"></p>
</div>

<!-- ░░ TIMELINE ░░ -->
<div class="main-wrap">
  <div id="timelineContainer"></div>
</div>

<!-- ░░ MONTH MODAL ░░ -->
<div id="monthModal" class="modal-backdrop"
     onclick="if(event.target===this)closeMdl('monthModal')">
  <div class="modal-card">
    <div class="modal-hd">
      <div class="modal-hd-icon"><i class="fas fa-calendar-alt"></i></div>
      <h4>New Month</h4>
    </div>
    <input id="newMName" class="modal-input" placeholder="Month — e.g. April 2026">
    <input id="newMSub"  class="modal-input" placeholder="Sub-heading — e.g. Q2 Release">
    <button class="modal-save" onclick="saveMonth()">Create Month</button>
  </div>
</div>

<!-- ░░ TAG MODAL ░░ -->
<div id="tagModal" class="modal-backdrop"
     onclick="if(event.target===this)closeMdl('tagModal')">
  <div class="modal-card">
    <div class="modal-hd">
      <div class="modal-hd-icon"><i class="fas fa-tag"></i></div>
      <h4 id="tagModalTitle">Add Tag</h4>
    </div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
      <input id="tName" class="modal-input" placeholder="Tag name" style="margin-bottom:0;flex:1" onkeydown="if(event.key==='Enter'){event.preventDefault();document.getElementById('tDesc').focus()}">
      <div id="tSnBadge" style="display:none;flex-shrink:0;font-size:11px;font-weight:700;color:var(--text-dim);background:var(--surface-2);border:1px solid var(--border) !important;border-radius:6px;padding:4px 9px;white-space:nowrap">#<span id="tSnNum"></span></div>
    </div>
    <textarea id="tDesc" class="modal-input" placeholder="Description (optional)" rows="4" style="resize:vertical;min-height:80px"></textarea>
    <div style="margin-bottom:12px">
      <div id="tColorLabel" style="font-size:11px;font-weight:600;color:var(--text-dim);margin-bottom:6px;letter-spacing:.3px;transition:color .2s">COLOR</div>
      <div class="tc-row" id="tcRow">
        <div class="tc" style="background:#5c6ac4" onclick="pickTagColor(this)" data-c="#5c6ac4"></div>
        <div class="tc" style="background:#0ea5e9" onclick="pickTagColor(this)" data-c="#0ea5e9"></div>
        <div class="tc" style="background:#10b981" onclick="pickTagColor(this)" data-c="#10b981"></div>
        <div class="tc" style="background:#f59e0b" onclick="pickTagColor(this)" data-c="#f59e0b"></div>
        <div class="tc" style="background:#ef4444" onclick="pickTagColor(this)" data-c="#ef4444"></div>
        <div class="tc" style="background:#8b5cf6" onclick="pickTagColor(this)" data-c="#8b5cf6"></div>
        <div class="tc" style="background:#ec4899" onclick="pickTagColor(this)" data-c="#ec4899"></div>
        <div class="tc" style="background:#64748b" onclick="pickTagColor(this)" data-c="#64748b"></div>
      </div>
      <input type="hidden" id="tColor" value="">
    </div>
    <div style="margin-bottom:12px">
      <div style="font-size:11px;font-weight:600;color:var(--text-dim);margin-bottom:6px;letter-spacing:.3px">TEXT COLOR</div>
      <div class="tc-row" id="tcTextRow">
        <div class="tc" style="background:#5c6ac4" onclick="pickTagTextColor(this)" data-c="#5c6ac4"></div>
        <div class="tc" style="background:#0ea5e9" onclick="pickTagTextColor(this)" data-c="#0ea5e9"></div>
        <div class="tc" style="background:#10b981" onclick="pickTagTextColor(this)" data-c="#10b981"></div>
        <div class="tc" style="background:#f59e0b" onclick="pickTagTextColor(this)" data-c="#f59e0b"></div>
        <div class="tc" style="background:#ef4444" onclick="pickTagTextColor(this)" data-c="#ef4444"></div>
        <div class="tc" style="background:#8b5cf6" onclick="pickTagTextColor(this)" data-c="#8b5cf6"></div>
        <div class="tc" style="background:#ec4899" onclick="pickTagTextColor(this)" data-c="#ec4899"></div>
        <div class="tc" style="background:#64748b" onclick="pickTagTextColor(this)" data-c="#64748b"></div>
        <div class="tc" style="background:var(--text-main);border:1px solid var(--border) !important" onclick="pickTagTextColor(this)" data-c="" title="Default"></div>
      </div>
      <input type="hidden" id="tTextColor" value="">
    </div>
    <button class="modal-save" onclick="saveTag()">Save Tag</button>
    <button id="tagDelBtn" onclick="delTagEdit()" style="display:none;width:100%;margin-top:8px;height:36px;border-radius:var(--radius-sm);background:var(--clr-block-bg);color:var(--clr-block);border:1px solid var(--clr-block-bd) !important;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer">Delete Tag</button>
  </div>
</div>

<!-- ░░ NEW STAGE MODAL ░░ -->
<div id="newStageModal" class="modal-backdrop"
     onclick="if(event.target===this)closeMdl('newStageModal')">
  <div class="modal-card">
    <div class="modal-hd">
      <div class="modal-hd-icon"><i class="fas fa-layer-group"></i></div>
      <h4>New Stage</h4>
    </div>
    <p style="font-size:12.5px;color:var(--text-muted);margin-bottom:14px">What should this stage track?</p>
    <button onclick="createStage('logs')" style="display:flex;align-items:center;gap:12px;width:100%;padding:13px 14px;background:var(--surface-2);border:1.5px solid var(--border) !important;border-radius:var(--radius-sm);cursor:pointer;font-family:inherit;margin-bottom:8px;text-align:left;transition:border-color .15s,background .15s" onmouseenter="this.style.background='var(--surface-3)'" onmouseleave="this.style.background='var(--surface-2)'">
      <div style="width:34px;height:34px;border-radius:9px;background:var(--primary-light);color:var(--primary);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px"><i class="fas fa-list-ul"></i></div>
      <div>
        <div style="font-size:13px;font-weight:700;color:var(--text-main)">Change Logs</div>
        <div style="font-size:11px;color:var(--text-dim);margin-top:1px">App · Gateway · Firmware release notes</div>
      </div>
    </button>
    <button onclick="createStage('comments')" style="display:flex;align-items:center;gap:12px;width:100%;padding:13px 14px;background:var(--surface-2);border:1.5px solid var(--border) !important;border-radius:var(--radius-sm);cursor:pointer;font-family:inherit;text-align:left;transition:border-color .15s,background .15s" onmouseenter="this.style.background='var(--surface-3)'" onmouseleave="this.style.background='var(--surface-2)'">
      <div style="width:34px;height:34px;border-radius:9px;background:#f0fdf4;color:#16a34a;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px"><i class="fas fa-comment-alt"></i></div>
      <div>
        <div style="font-size:13px;font-weight:700;color:var(--text-main)">Comments</div>
        <div style="font-size:11px;color:var(--text-dim);margin-top:1px">Simple notes and comment thread</div>
      </div>
    </button>
  </div>
</div>

<!-- ░░ STATUS MODAL ░░ -->
<div id="statusModal" class="modal-backdrop"
     onclick="if(event.target===this)closeMdl('statusModal')">
  <div class="modal-card">
    <div class="modal-hd">
      <div class="modal-hd-icon"><i class="fas fa-circle-dot"></i></div>
      <h4>Add Status</h4>
    </div>
    <input id="sName" class="modal-input" placeholder="Status name">
    <div style="margin-bottom:14px">
      <div style="font-size:11px;font-weight:600;color:var(--text-dim);margin-bottom:6px;letter-spacing:.3px">COLOR</div>
      <div class="tc-row" id="scRow">
        <div class="tc" style="background:#a1a1aa" onclick="pickStatusColor(this)" data-c="#a1a1aa"></div>
        <div class="tc" style="background:#f59e0b" onclick="pickStatusColor(this)" data-c="#f59e0b"></div>
        <div class="tc" style="background:#16a34a" onclick="pickStatusColor(this)" data-c="#16a34a"></div>
        <div class="tc" style="background:#dc2626" onclick="pickStatusColor(this)" data-c="#dc2626"></div>
        <div class="tc" style="background:#0ea5e9" onclick="pickStatusColor(this)" data-c="#0ea5e9"></div>
        <div class="tc" style="background:#8b5cf6" onclick="pickStatusColor(this)" data-c="#8b5cf6"></div>
        <div class="tc" style="background:#5c6ac4" onclick="pickStatusColor(this)" data-c="#5c6ac4"></div>
        <div class="tc" style="background:#64748b" onclick="pickStatusColor(this)" data-c="#64748b"></div>
      </div>
      <input type="hidden" id="sColor" value="#a1a1aa">
    </div>
    <button class="modal-save" onclick="saveNewStatus()">Add Status</button>
  </div>
</div>

<!-- Floating text colour toolbar -->
<div id="hl-toolbar" style="display:none;position:fixed;z-index:9999;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:6px 10px;gap:7px;align-items:center;box-shadow:0 4px 20px rgba(0,0,0,.18)">
  <i class="fas fa-palette" style="font-size:10px;color:var(--text-dim);margin-right:1px"></i>
  <div onmousedown="event.preventDefault()" onclick="applyHighlight('#d97706')" style="width:15px;height:15px;border-radius:50%;background:#d97706;cursor:pointer" title="Amber"></div>
  <div onmousedown="event.preventDefault()" onclick="applyHighlight('#16a34a')" style="width:15px;height:15px;border-radius:50%;background:#16a34a;cursor:pointer" title="Green"></div>
  <div onmousedown="event.preventDefault()" onclick="applyHighlight('#dc2626')" style="width:15px;height:15px;border-radius:50%;background:#dc2626;cursor:pointer" title="Red"></div>
  <div onmousedown="event.preventDefault()" onclick="applyHighlight('#2563eb')" style="width:15px;height:15px;border-radius:50%;background:#2563eb;cursor:pointer" title="Blue"></div>
  <div onmousedown="event.preventDefault()" onclick="applyHighlight('#7c3aed')" style="width:15px;height:15px;border-radius:50%;background:#7c3aed;cursor:pointer" title="Purple"></div>
  <div onmousedown="event.preventDefault()" onclick="applyHighlight('#db2777')" style="width:15px;height:15px;border-radius:50%;background:#db2777;cursor:pointer" title="Pink"></div>
  <div onmousedown="event.preventDefault()" onclick="applyHighlight('transparent')" style="width:15px;height:15px;border-radius:50%;background:var(--surface-2);border:1.5px dashed var(--border);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--text-dim)" title="Reset">×</div>
</div>

<script src="Release.js"></script>
</body>
</html>
